name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke test (import + syntax)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify core package imports cleanly
        run: |
          python -c "
          import core.state as s
          import core.interpreter
          import core.config
          import core.process
          import core.notifications
          import core.diagnostics
          import core.repl
          import core.ollama
          import core.build
          import core.automation
          import core.coder
          print('All core modules OK')
          "

      - name: Verify ui package imports cleanly
        run: |
          python -c "
          import core.state
          import ui.theme
          print('UI theme OK')
          "

      - name: Verify entry point syntax
        run: python -m py_compile main.py version.py
